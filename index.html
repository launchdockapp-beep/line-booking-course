<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課程預約系統</title>
  
  <!-- PWA & Mobile Meta -->
  <meta name="theme-color" content="#121214">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="課程預約">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="manifest" href="./manifest.webmanifest">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- Firebase SDKs (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="./firebase-init.js"></script>

  <style>
    :root {
      --bg: #0f0f11;
      --card-bg: rgba(24, 24, 27, 0.7);
      --border: rgba(45, 212, 191, 0.2);
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      --primary: #2dd4bf;
      --secondary: #f43f5e;
      --font-sans: 'Outfit', 'Noto Sans TC', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding: 1.5rem;
    }

    /* Ambient Background Glows */
    .glow-1 {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      pointer-events: none;
      z-index: 1;
    }

    .glow-2 {
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(244, 63, 94, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
      pointer-events: none;
      z-index: 1;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      z-index: 10;
      text-align: center;
      position: relative;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Geometric Logo representation in CSS */
    .logo-container {
      width: 96px;
      height: 96px;
      margin: 0 auto 2rem;
      background: #121214;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.05), 0 10px 20px rgba(0,0,0,0.3);
    }

    .logo-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.4) 0%, rgba(0,0,0,0) 70%);
      filter: blur(8px);
      z-index: -1;
    }

    .logo-shape {
      width: 60px;
      height: 60px;
      position: relative;
    }

    .logo-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(45, 212, 191, 0.55);
      width: 32px;
      height: 32px;
      top: 14px;
    }
    .logo-circle.left {
      left: 6px;
    }
    .logo-circle.right {
      right: 6px;
    }

    .logo-diamond {
      position: absolute;
      left: 23px;
      top: 8px;
      width: 14px;
      height: 36px;
      background: #ccfbf1;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }

    .logo-crescent {
      position: absolute;
      left: 10px;
      bottom: 6px;
      width: 40px;
      height: 16px;
      background: rgba(244, 63, 94, 0.8);
      border-radius: 50% / 0 0 100% 100%;
    }

    .logo-dot {
      position: absolute;
      left: 27px;
      top: 0;
      width: 6px;
      height: 6px;
      background: #ccfbf1;
      border-radius: 50%;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #f4f4f5 30%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.tagline {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(45, 212, 191, 0.1);
      border: 1px solid rgba(45, 212, 191, 0.2);
      color: var(--primary);
      padding: 0.35rem 0.85rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .badge .indicator {
      width: 6px;
      height: 6px;
      background-color: var(--primary);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--primary);
    }

    .status-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: left;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-val {
      color: var(--text);
      font-weight: 600;
      font-family: monospace;
    }

    .pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: .5;
      }
    }
  </style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="card">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <div class="logo-shape">
        <div class="logo-dot"></div>
        <div class="logo-diamond"></div>
        <div class="logo-circle left"></div>
        <div class="logo-circle right"></div>
        <div class="logo-crescent"></div>
      </div>
    </div>

    <div class="badge">
      <div class="indicator pulse" id="pwa-dot"></div>
      <span id="pwa-badge">Service Worker 啟動中</span>
    </div>

    <h1>課程預約系統</h1>
    <p class="tagline">舞蹈與瑜珈教室的專屬預約空間。<br>請將此頁面「加入主畫面」以獲得最佳使用體驗。</p>

    <div class="status-box">
      <div class="status-row">
        <span>連線模式:</span>
        <span class="status-val" id="online-status">檢查中...</span>
      </div>
      <div class="status-row">
        <span>離線快取 (PWA):</span>
        <span class="status-val" id="cache-status">未就緒</span>
      </div>
    </div>

    <!-- Cloud Connection Test Button -->
    <div style="margin-top: 1.5rem;">
      <button id="test-conn-btn" style="width: 100%; padding: 0.85rem 1.5rem; background: linear-gradient(135deg, var(--primary) 0%, #0d9488 100%); border: none; border-radius: 12px; color: #0f0f11; font-weight: 700; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.2s, opacity 0.2s; box-shadow: 0 4px 12px rgba(45, 212, 191, 0.3);">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path></svg>
        雲端連線測試
      </button>
      <div id="test-result" style="margin-top: 1rem; font-size: 0.8rem; line-height: 1.4; padding: 0.85rem; border-radius: 12px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); text-align: left; display: none;">
        <div style="font-weight: 600; margin-bottom: 0.25rem;" id="test-result-title">測試中...</div>
        <div id="test-result-detail" style="color: var(--text-muted); font-family: monospace; word-break: break-all;"></div>
      </div>
    </div>
  </div>

  <script>
    // Update online status
    function updateOnlineStatus() {
      const statusEl = document.getElementById('online-status');
      if (navigator.onLine) {
        statusEl.textContent = 'ONLINE';
        statusEl.style.color = '#2dd4bf';
      } else {
        statusEl.textContent = 'OFFLINE';
        statusEl.style.color = '#f43f5e';
      }
    }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((registration) => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
            
            const badge = document.getElementById('pwa-badge');
            const dot = document.getElementById('pwa-dot');
            const cacheStatus = document.getElementById('cache-status');
            
            badge.textContent = 'PWA 系統就緒';
            badge.style.color = '#2dd4bf';
            dot.style.backgroundColor = '#2dd4bf';
            dot.classList.remove('pulse');
            cacheStatus.textContent = '已啟用 (CACHE v1)';
            cacheStatus.style.color = '#2dd4bf';
          })
          .catch((error) => {
            console.error('ServiceWorker registration failed: ', error);
            document.getElementById('pwa-badge').textContent = 'PWA 載入失敗';
            document.getElementById('cache-status').textContent = '未啟用';
          });
      });
    } else {
      document.getElementById('pwa-badge').textContent = '不支援 PWA';
      document.getElementById('cache-status').textContent = '不支援';
    }

    // Cloud connection test execution logic
    const testBtn = document.getElementById('test-conn-btn');
    const resultBox = document.getElementById('test-result');
    const resultTitle = document.getElementById('test-result-title');
    const resultDetail = document.getElementById('test-result-detail');

    testBtn.addEventListener('click', () => {
      testBtn.disabled = true;
      testBtn.style.opacity = '0.6';
      resultBox.style.display = 'block';
      resultTitle.textContent = '正在驗證連線...';
      resultTitle.style.color = '#eab308';
      resultDetail.textContent = '等待 Firebase 匿名驗證及寫入資料庫...';

      authReady
        .then((user) => {
          // Write test document to Firestore config/ping
          const pingDocRef = db.collection('config').doc('ping');
          return pingDocRef.set({
            at: firebase.firestore.FieldValue.serverTimestamp(),
            by: user.uid
          }).then(() => {
            // Read back
            return pingDocRef.get();
          });
        })
        .then((doc) => {
          if (doc.exists) {
            const data = doc.data();
            const timeStr = data.at ? new Date(data.at.toDate()).toLocaleString() : '未取得伺服器時間 (可能稍後更新)';
            resultTitle.textContent = '✓ 連線測試成功';
            resultTitle.style.color = '#2dd4bf';
            resultDetail.innerHTML = `寫入 UID: <span style="color:var(--text)">${data.by}</span><br>伺服器回傳時間: <span style="color:var(--text)">${timeStr}</span>`;
          } else {
            throw new Error('找不到 ping 測試文件');
          }
        })
        .catch((error) => {
          console.error('Connection test error:', error);
          resultTitle.textContent = '✕ 連線測試失敗';
          resultTitle.style.color = '#f43f5e';
          resultDetail.textContent = error.message || error;
        })
        .finally(() => {
          testBtn.disabled = false;
          testBtn.style.opacity = '1';
        });
    });
  </script>
</body>
</html>
